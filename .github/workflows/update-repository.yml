name: Update Repository JSON

on:
  push:
    branches:
      - main
    paths:
      # Matches ANY .html file at ANY depth within components/
      # Examples:
      #   - components/common/file.html
      #   - components/common/test/file.html
      #   - components/a/b/c/d/e/file.html
      - 'components/**/*.html'
      # Also trigger if automation scripts change
      - '.github/scripts/**/*.js'
      - '.github/workflows/*.yml'

jobs:
  update-repository:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Generate repository.json
        run: node .github/scripts/generate-repository.js
        
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code repository.json || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add repository.json
          git commit -m "chore: auto-update repository.json [skip ci]"
          git push